[tox]
envlist =
    py312
    py312-oldestdeps
    py312-alldeps
    py312-cov
isolated_build = true

[testenv]
usedevelop = True
description = Run tests
setenv =
    PYTHONPATH = {toxinidir}/EclipsingBinaries
deps =
    pytest
commands =
    pytest -o pythonpath={toxinidir} tests

[testenv:py312-oldestdeps]
description = Test with minimum dependency versions
deps =
    pytest
    numpy==1.26.*
    astropy==6.0.*
setenv =
    PYTHONPATH = {toxinidir}/EclipsingBinaries
commands =
    pytest ./tests

[testenv:py312-alldeps]
description = Test with latest dependencies
deps =
    pytest
setenv =
    PYTHONPATH = {toxinidir}/EclipsingBinaries
commands =
    pytest ./tests

[testenv:py312-cov]
description = Test with coverage
deps =
    pytest
    pytest-cov
setenv =
    PYTHONPATH = {toxinidir}/EclipsingBinaries
commands =
    pytest ./tests --cov=EclipsingBinaries --cov-config=setup.cfg
